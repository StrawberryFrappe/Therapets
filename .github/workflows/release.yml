name: Build and Release

on:
  push:
    branches: [ "main", "dev", "unstable" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_and_release:
    name: Build and Release
    runs-on: ubuntu-latest
    # Skip version-bump commits to avoid infinite loops
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump Version
        id: version
        run: |
          CURRENT=$(grep '^version:' pubspec.yaml | sed 's/version: //')
          BASE_VERSION=$(echo "$CURRENT" | cut -d'+' -f1)
          CLEAN_VERSION=$(echo "$BASE_VERSION" | cut -d'-' -f1)

          MAJOR=$(echo "$CLEAN_VERSION" | cut -d'.' -f1)
          MINOR=$(echo "$CLEAN_VERSION" | cut -d'.' -f2)
          PATCH=$(echo "$CLEAN_VERSION" | cut -d'.' -f3)

          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            NEW_PATCH=$((PATCH + 1))
            NEW_VERSION="$MAJOR.$MINOR.$NEW_PATCH"
            NEW_FULL_VERSION="$NEW_VERSION+${{ github.run_number }}"
            TAG_NAME="v$NEW_VERSION"
            BUMP_COMMIT="true"
            PRERELEASE="false"
          elif [ "${{ github.ref }}" == "refs/heads/unstable" ]; then
            NEW_VERSION="$MAJOR.$MINOR.$PATCH-unstable.${{ github.run_number }}"
            NEW_FULL_VERSION="$NEW_VERSION+${{ github.run_number }}"
            TAG_NAME="v$NEW_VERSION"
            BUMP_COMMIT="false"
            PRERELEASE="true"
          else
            NEW_VERSION="$MAJOR.$MINOR.$PATCH-nightly.${{ github.run_number }}"
            NEW_FULL_VERSION="$NEW_VERSION+${{ github.run_number }}"
            TAG_NAME="v$NEW_VERSION"
            BUMP_COMMIT="false"
            PRERELEASE="true"
          fi

          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "new_full_version=$NEW_FULL_VERSION" >> $GITHUB_OUTPUT
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "bump_commit=$BUMP_COMMIT" >> $GITHUB_OUTPUT
          echo "prerelease=$PRERELEASE" >> $GITHUB_OUTPUT

          # Update pubspec.yaml for the build
          sed -i "s/^version: .*/version: $NEW_FULL_VERSION/" pubspec.yaml
          echo "Bumped version for build to $NEW_FULL_VERSION"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/upload-keystore.jks

      - name: Create key.properties
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "storePassword=$KEYSTORE_PASSWORD" > android/key.properties
          echo "keyPassword=$KEY_PASSWORD" >> android/key.properties
          echo "keyAlias=$KEY_ALIAS" >> android/key.properties
          echo "storeFile=upload-keystore.jks" >> android/key.properties

      - name: Build Android APK
        run: flutter build apk --release

      - name: Commit Version Bump (Main only)
        id: commit
        if: steps.version.outputs.bump_commit == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add pubspec.yaml
          git commit -m "chore: bump version to ${{ steps.version.outputs.new_full_version }} [skip ci]"
          git push
          echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag_name }}
          name: Release ${{ steps.version.outputs.tag_name }}
          target_commitish: ${{ steps.commit.outputs.sha || github.sha }}
          draft: false
          prerelease: ${{ steps.version.outputs.prerelease == 'true' }}
          files: |
            build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
