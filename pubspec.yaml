name: Therapets
description: Virtual pet therapy app for orthotic devices.
publish_to: 'none'
version: 1.0.5+58

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  cupertino_icons: ^1.0.2
  flutter_blue_plus: ^1.4.0
  shared_preferences: ^2.1.0
  flutter_foreground_task: ^9.1.0
  flame: ^1.21.0
  audioplayers: ^6.0.0
  wakelock_plus: ^1.2.8
  flutter_cube: ^0.1.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  http: ^1.1.0
  connectivity_plus: ^5.0.2
  mobile_scanner: ^6.0.1
  provider: ^6.1.5+1
  url_launcher: ^6.3.2
  package_info_plus: ^9.0.0
  dio: ^5.9.2
  path_provider: ^2.1.5
  open_filex: ^4.7.0
  # permission_handler removed due to Android embedding compatibility; runtime
  # permissions are requested via platform prompts where possible.
  # google_fonts removed in favor of bundled Monocraft.ttf

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.3
  hive_generator: ^2.0.1
  build_runner: ^2.4.9

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/food_sushi.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/food_sushi.png"

flutter:
  generate: true
  uses-material-design: true
  fonts:
    - family: Monocraft
      fonts:
        - asset: Monocraft.ttf
  assets:
    - assets/images/
    - assets/models/

